name: pricestation

services:
  db:
    container_name: db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pricestation
      POSTGRES_PASSWORD: pricestation
      POSTGRES_DB: pricestation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricestation"]
      interval: 5s
      retries: 5

  migrate:
    container_name: migrate
    build: ..
    entrypoint: ["alembic"]
    command: ["upgrade", "head"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  bot:
    container_name: bot
    build: ..
    command: ["bot.main"]
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    container_name: worker
    build: ..
    command: ["worker.main"]
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
