name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: docker compose -f deploy/docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from test
      - name: Extract coverage report
        if: always()
        run: docker cp test:/app/coverage.xml coverage.xml || true
      - name: Coverage comment
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: coverage.xml
      - name: Cleanup
        if: always()
        run: docker compose -f deploy/docker-compose.test.yml down
